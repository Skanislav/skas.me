name: Build & Pin to IPFS

# Builds the static export and pins it to IPFS on every push to main.
# The CID is written to the job summary. Pointing ENS at the new CID is a deliberate
# manual step in the ENS app (app.ens.domains) so an on-chain key never lives in CI.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Pin to IPFS
        env:
          PINATA_JWT: ${{ secrets.PINATA_JWT }}
          PINATA_GATEWAY: ${{ secrets.PINATA_GATEWAY }}
        run: npm run pin

      - name: Report CID
        run: |
          CID=$(cat .cid)
          echo "### 📌 Pinned to IPFS" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- CID: \`$CID\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Preview: https://dweb.link/ipfs/$CID/" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Set the ENS contenthash to \`ipfs://$CID\` in app.ens.domains" >> "$GITHUB_STEP_SUMMARY"
